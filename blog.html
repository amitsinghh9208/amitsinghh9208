<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Technical blog by Amit Singh - QA, Fintech, Cloud, and Testing insights">
    <meta name="robots" content="index, follow">
    <title>Blog - Amit Singh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
      main {
        max-width: 1000px;
        margin: 0 auto;
        padding: 4rem 2rem;
      }
      
      h1 {
        text-align: center;
        margin-bottom: 3rem;
        color: #667eea;
      }
      
      .coming-soon {
        text-align: center;
        padding: 4rem 2rem;
        background: #f9f9f9;
        border-radius: 10px;
        margin: 2rem 0;
      }
      
      .coming-soon p {
        font-size: 1.1rem;
        color: #666;
        margin-bottom: 2rem;
      }
      
      .back-link {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.75rem 1.5rem;
        background: #667eea;
        color: white;
        border-radius: 50px;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      
      .back-link:hover {
        background: #764ba2;
        transform: translateY(-2px);
      }
    </style>

        <a href="./" class="back-link">← Back to Home</a>
