<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YLC9XCD134"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-YLC9XCD134', {
        page_path: window.location.pathname
      });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Amit Singh</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <meta name="description" content="Blog by Amit Singh - Articles on QA, Fintech, Cloud Systems, AWS, and Technology Governance.">
  </head>
  <body>
    <!-- Navbar -->
    <header>
      <nav>
        <div class="logo">
          <img src="images/profile.jpg" alt="Logo">
        </div>
        <ul>
          <li>
            <a href="index.html#home">Home</a>
          </li>
          <li>
            <a href="index.html#about">About</a>
          </li>
          <li>
            <a href="index.html#skills">Skills</a>
          </li>
          <li>
            <a href="index.html#projects">Projects</a>
          </li>
          <li>
            <a href="blog.html">Blog</a>
          </li>
          <li>
            <a href="travel.html">Travel</a>
          </li>
          <li>
            <a href="index.html#contact">Contact</a>
          </li>
        </ul>
        <button class="theme-toggle" onclick="toggleTheme()">Toggle Mode</button>
      </nav>
    </header>

    <!-- Blog Hero -->
    <section class="blog-hero">
      <div data-aos="fade-up">
        <p class="tag">INSIGHTS & STORIES</p>
        <h1>My Tech Blog</h1>
        <p>Exploring QA, Cloud Systems, Fintech, and Technology Leadership</p>
      </div>
    </section>

    <!-- Blog Editor (Admin Only) -->
    <section id="blog-editor" class="blog-editor" style="display: none;">
      <h2>Create New Blog Post</h2>
      <div class="editor-container">
        <input type="text" id="postTitle" placeholder="Post Title" class="input-field">
        <input type="text" id="postCategory" placeholder="Category (e.g., QA, Cloud, Fintech)" class="input-field">
        <textarea id="postContent" placeholder="Write your blog post here..." class="textarea-field"></textarea>
        <input type="text" id="postAuthor" placeholder="Author Name" class="input-field" value="Amit Singh">
        <div class="editor-buttons">
          <button onclick="saveBlogPost()" class="btn primary">Publish Post</button>
          <button onclick="cancelEdit()" class="btn secondary">Cancel</button>
        </div>
      </div>
    </section>

    <!-- Admin Controls -->
    <section id="admin-controls" class="admin-controls" style="display: none;">
      <button onclick="toggleEditor()" class="btn primary">+ New Post</button>
      <button onclick="showManagement()" class="btn secondary">Manage Posts</button>
    </section>

    <!-- Blog Posts Container -->
    <section id="blog-posts" class="blog-posts">
      <div id="posts-container" class="posts-container">
        <!-- Blog posts will be loaded here -->
      </div>
      <div id="empty-state" class="empty-state">
        <p>No blog posts yet. Check back soon!</p>
      </div>
    </section>

    <!-- Modal for Full Post -->
    <div id="postModal" class="modal" onclick="closeModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalPostContent"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer style="text-align: center; padding: 40px 20px; background: var(--card); margin-top: 50px;">
      <p>&copy; 2024 Amit Singh. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="script.js?v=2"></script>
    <script>
      // Initialize blog
      document.addEventListener("DOMContentLoaded", function () {
        initializeBlog();
        AOS.init({
          duration: 1000,
          once: true
        });
      });
    </script>
  </body>
</html>
